<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{HOST}} - WiFi Setup</title>
<style>
:root{--blue:#1d4ed8;--blue2:#2563eb;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#eef1f6}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%}
.wrap{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.head{background:linear-gradient(160deg,var(--blue2),var(--blue));color:#fff;padding:28px 24px 26px;text-align:center;border-radius:0 0 22px 22px}
.badge{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.head h1{margin:0;font-size:22px;font-weight:700;word-break:break-word}
.head p{margin:4px 0 0;font-size:13px;opacity:.85}
.body{padding:22px;flex:1}
.lead{display:flex;gap:14px;align-items:flex-start;margin-bottom:22px}
.lead .ic{flex:none;width:40px;height:40px;border-radius:50%;background:#e8efff;color:var(--blue);display:flex;align-items:center;justify-content:center}
.lead h2{margin:0 0 4px;font-size:17px}
.lead small{color:var(--muted);font-size:13px;line-height:1.4}
label{display:block;font-size:14px;font-weight:600;margin:0 0 7px}
.row{display:flex;gap:8px;margin-bottom:16px}
.ctrl{position:relative;flex:1}
.ctrl .pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.ctrl .post{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:0;color:var(--muted);cursor:pointer;padding:4px}
input,select{width:100%;font-size:15px;padding:13px 14px 13px 40px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);appearance:none;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%236b7280' stroke-width='2'><path d='M2 5l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
.icbtn{flex:none;width:48px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.icbtn:active{background:#f3f4f6}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin:-6px 0 6px}
.chk input{width:auto;padding:0}
button.go{width:100%;border:0;border-radius:11px;background:var(--blue);color:#fff;font-size:16px;font-weight:600;padding:15px;cursor:pointer;margin-top:8px}
button.go:active{background:var(--blue2)}
.foot{display:flex;border-top:1px solid var(--line);background:#f7f8fa}
.foot div{flex:1;text-align:center;padding:14px 6px}
.foot .ic{color:var(--muted);margin-bottom:5px}
.foot b{display:block;font-size:13px;color:var(--ink);word-break:break-word}
.foot span{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<div class="head">
<div class="badge"><svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="6.5" r="1.6"/><circle cx="7.5" cy="12.5" r="1.6"/><circle cx="16.5" cy="12.5" r="1.6"/><circle cx="12" cy="17.5" r="1.6"/><circle cx="12" cy="12" r="7.5" fill="none" stroke="#fff" stroke-width="1.6"/></svg></div>
<h1>{{HOST}}</h1>
<p>WiFi Configuration</p>
</div>
<form class="body" method="POST" action="/">
<div class="lead">
<div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg></div>
<div><h2>Let's get you connected</h2><small>Choose a WiFi network and enter the password to configure your device.</small></div>
</div>
<label for="ssid">WiFi Network</label>
<div class="row">
<div class="ctrl"><span class="pre"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg></span>
<select id="ssid" name="ssid" required onchange="onNet()"><option value="" disabled selected>Select your network</option>{{NETWORKS}}<option value="__other__">Other network&hellip;</option></select></div>
<button class="icbtn" type="button" title="Rescan" onclick="location.reload()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v5h-5"/></svg></button>
</div>
<input id="ssidManual" name="ssid_manual" placeholder="Network name (SSID)" style="display:none;padding-left:14px;margin-top:-8px;margin-bottom:16px">
<label for="pass">Password</label>
<div class="ctrl" style="margin-bottom:10px"><span class="pre"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></span>
<input id="pass" name="pass" type="password" placeholder="Enter password" autocomplete="off">
<button class="post" type="button" title="Show password" onclick="togglePw()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
<label class="chk"><input type="checkbox" onclick="togglePw()"> Show password</label>
<button class="go" type="submit">Save &amp; Connect</button>
</form>
<div class="foot">
<div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/></svg></div><b>{{HOST}}</b><span>Device</span></div>
<div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/></svg></div><b>{{IP}}</b><span>IP Address</span></div>
<div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v3M14 3v3M10 18v3M14 18v3M3 10h3M3 14h3M18 10h3M18 14h3"/></svg></div><b>{{VERSION}}</b><span>Firmware</span></div>
</div>
</div>
<script>
function togglePw(){var p=document.getElementById('pass');p.type=p.type==='password'?'text':'password';}
function onNet(){var m=document.getElementById('ssidManual');var o=document.getElementById('ssid').value==='__other__';m.style.display=o?'block':'none';if(o)m.focus();}
</script>
</body></html>
