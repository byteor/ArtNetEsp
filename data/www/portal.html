<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>{{HOST}} - WiFi Setup</title><link rel="stylesheet" href="/style.css"></head><body><div class="wrap"><div class="head"><div class="badge"><svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="6.5" r="1.6"/><circle cx="7.5" cy="12.5" r="1.6"/><circle cx="16.5" cy="12.5" r="1.6"/><circle cx="12" cy="17.5" r="1.6"/><circle cx="12" cy="12" r="7.5" fill="none" stroke="#fff" stroke-width="1.6"/></svg></div><h1>ArtNet Node</h1><h3>{{HOST}}</h3><p>WiFi Configuration</p></div><form class="body" method="POST" action="/"><div class="lead"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg></div><div><h2>Let's get you connected</h2><small>Choose a WiFi network and enter the password to configure your device.</small></div></div><label for="ssid">WiFi Network</label><div class="row"><div class="ctrl"><span class="pre"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg> </span><select id="ssid" name="ssid" required><option value="" disabled="disabled" selected="selected">Select your network</option> {{NETWORKS}} <option value="__other__">Other network&hellip;</option></select></div><button id="rescan" class="icbtn" type="button" title="Rescan"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v5h-5"/></svg></button></div><input id="ssidManual" name="ssid_manual" placeholder="Network name (SSID)" style="display:none;padding-left:14px;margin-top:-8px;margin-bottom:16px"> <label for="pass">Password</label><div class="ctrl" style="margin-bottom:10px"><span class="pre"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> </span><input id="pass" name="pass" type="password" placeholder="Enter password" autocomplete="off"> <button id="toggle" class="post" type="button" title="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div><label class="chk"><input id="showpw" type="checkbox"> Show password</label> <button class="btn" type="submit">Save &amp; Connect</button></form><div class="foot"><div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/></svg></div><b>{{HOST}}</b><span>Device</span></div><div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/></svg></div><b>{{IP}}</b><span>IP Address</span></div><div><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="7" width="10" height="10" rx="1.5"/><path d="M10 3v3M14 3v3M10 18v3M14 18v3M3 10h3M3 14h3M18 10h3M18 14h3"/></svg></div><b>{{VERSION}}</b><span>Firmware</span></div></div></div><script>const pass=document.getElementById("pass"),ssid=document.getElementById("ssid"),manual=document.getElementById("ssidManual"),toggle=()=>{pass.type="password"===pass.type?"text":"password"};document.getElementById("toggle").addEventListener("click",toggle),document.getElementById("showpw").addEventListener("click",toggle),document.getElementById("rescan").addEventListener("click",()=>location.reload()),ssid.addEventListener("change",()=>{const e="__other__"===ssid.value;manual.style.display=e?"block":"none",e&&manual.focus()})</script></body></html>
