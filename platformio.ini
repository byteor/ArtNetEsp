; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
extra_scripts =
   pre:platformio_version_increment/version_increment_pre.py
   post:platformio_version_increment/version_increment_post.py
monitor_speed = 115200
framework = arduino
lib_deps =
	hideakitai/ArtNet@^0.4.4
	bblanchon/ArduinoJson@^6.17.3
	bxparks/AceButton@^1.8.2
	ivanseidel/LinkedList@0.0.0-alpha+sha.dac3874d28
	alanswx/ESPAsyncWiFiManager@^0.31

[common_esp8266]
extends = common
platform = espressif8266 @ 4.2.1
lib_ignore =
	esp_dmx
lib_deps =
	${common.lib_deps}
	ottowinter/ESPAsyncWebServer-esphome@^3.2.0

[common_esp32]
extends = common
platform = espressif32 @ 6.6.0
build_unflags = -std=gnu++11
build_flags =
	-std=gnu++17
monitor_filters = esp32_exception_decoder
lib_deps =
	${common.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	erropix/ESP32 AnalogWrite@^0.2
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1
	someweisguy/esp_dmx@^4.1.0

[env:d1_mini_oled]
extends = common_esp8266
board = d1_mini
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs
build_flags =
	-DOLED_SSD1306=1
	-DSCREEN_ADDRESS=0x3C
	-DLED_PIN=13
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp8266.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	rickgg/ESPDMX@0.0.0-alpha+sha.224e1834e1
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1

[env:d1_mini]
extends = common_esp8266
board = d1_mini
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs
build_flags = -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp8266.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	rickgg/ESPDMX@0.0.0-alpha+sha.224e1834e1
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1

[env:nodemcuv2]
extends = common_esp8266
board = nodemcuv2
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs
build_flags = -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp8266.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	rickgg/ESPDMX@0.0.0-alpha+sha.224e1834e1
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1

[env:heltec_wifi_kit_8]
extends = common_esp8266
board = heltec_wifi_kit_8
build_flags =
	-DOLED_SSD1306=1
	-DARDUINO_ESP8266_HELTEC_WIFI_KIT_8=1
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp8266.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	rickgg/ESPDMX@0.0.0-alpha+sha.224e1834e1
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1

[env:sonoff_basic]
extends = common_esp8266
board = sonoff_basic
board_build.ldscript = eagle.flash.1m128.ld
board_build.filesystem = littlefs
build_flags =
	-DDISABLE_OTA
	-DSONOFF_BASIC
lib_ignore =
	${common_esp8266.lib_ignore}
	Wire
	SPI
	Servo

[env:sonoff_s31]
extends = common_esp8266
board = sonoff_basic
board_build.ldscript = eagle.flash.1m128.ld
board_build.filesystem = littlefs
build_flags =
	-DDISABLE_OTA
	-DSONOFF_BASIC
	-DLED_PIN=13
lib_ignore =
	${common_esp8266.lib_ignore}
	Wire
	SPI
	Servo

[env:lolin32]
extends = common_esp32
board = lolin32
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DDMX_TX_PIN=17
	-DDMX_RX_PIN=12
	-DDMX_ENABLE_PIN=13
	-DLED_PIN=4
	-DDEFAULT_BUTTON_PIN=16
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^0.11.0

[env:esp32-devkitc-v4]
extends = common_esp32
board = esp32dev
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DDMX_TX_PIN=26
	-DDMX_RX_PIN=12			# not used
	-DDMX_ENABLE_PIN=13		# not used
	-DLED_PIN=14
	-DDEFAULT_BUTTON_PIN=27
	-DLED_BUILTIN=2
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^0.11.0

[env:lolin_s2_mini]
extends = common_esp32
board = lolin_s2_mini
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^0.11.0
	mathieucarbou/ESPAsyncWebServer@^3.4.5

[env:esp32-s3-devkitc-1]
extends = common_esp32
board = esp32-s3-devkitc-1
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DDMX_TX_PIN=17
	-DDMX_RX_PIN=12
	-DDMX_ENABLE_PIN=13
	-DLED_PIN=4
	-DDEFAULT_BUTTON_PIN=16
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^0.11.0

[env:seeed_xiao_esp32s3]
extends = common_esp32
board = seeed_xiao_esp32s3
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DDMX_TX_PIN=3
	-DDMX_RX_PIN=12		# Actually not used
	-DLED_PIN=21		# XIAO built-in LED pin is GPIO21
	-DDMX_ENABLE_PIN=13	# Actually not used
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^3.0.6

[env:seeed_xiao_esp32s3_oled]
extends = common_esp32
board = seeed_xiao_esp32s3
build_flags =
	${common_esp32.build_flags}
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-DOLED_SSD1306=1
	-DDMX_TX_PIN=3
	-DDMX_RX_PIN=12		# Actually not used
	-DLED_PIN=21		# XIAO built-in LED pin is GPIO21
	-DDMX_ENABLE_PIN=13	# Actually not used
lib_deps =
	${common_esp32.lib_deps}
	madhephaestus/ESP32Servo@^3.0.6
