; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; `pio run` (no -e) builds only the firmware envs - env:native has no src/
; to build (it's `pio test -e native` only, see that env's comment).
default_envs =
	d1_mini_oled
	d1_mini
	nodemcuv2
	heltec_wifi_kit_8
	sonoff_basic
	sonoff_s31
	lolin32
	esp32-devkitc-v4
	lolin_s2_mini
	esp32-s3-devkitc-1
	seeed_xiao_esp32s3
	seeed_xiao_esp32s3_oled

[common]
extra_scripts =
   pre:platformio_version_increment/version_increment_pre.py
   post:platformio_version_increment/version_increment_post.py
monitor_speed = 115200
framework = arduino
lib_deps =
	hideakitai/ArtNet@^0.9.2
	bblanchon/ArduinoJson@^7
	bxparks/AceButton@^1.8.2
	alanswx/ESPAsyncWiFiManager@^0.31
	ESP32Async/ESPAsyncWebServer@^3.11.1

[common_esp8266]
extends = common
platform = espressif8266 @ 4.2.1
lib_ignore =
	esp_dmx
lib_deps =
	${common.lib_deps}

[common_esp32]
extends = common
platform = espressif32 @ 6.6.0
build_unflags = -std=gnu++11
build_flags =
	-std=gnu++17
monitor_filters = esp32_exception_decoder
lib_deps =
	${common.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1
	someweisguy/esp_dmx@^4.1.0

[env:native]
platform = native
; Arduino-targeted src/ doesn't compile on the host toolchain (Arduino.h,
; WiFi.h, etc.) - this env only builds test/ suites, never src/.
build_src_filter = -<*>
lib_deps =
	bblanchon/ArduinoJson@^7

[env:d1_mini_oled]
extends = common_esp8266
board = d1_mini
board_build.ldscript = eagle.flash.4m2m.ld
board_build.filesystem = littlefs
build_flags =
	-DBOARD_D1_MINI_OLED
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
	${common_esp8266.lib_deps}
	adafruit/Adafruit SSD1306@^2.5.10
	adafruit/Adafruit BusIO@^1.16.0
	rickgg/ESPDMX@0.0.0-alpha+sha.224e1834e1
	adafruit/Adafruit GFX Library@^1.11.9
	ayushsharma82/ElegantOTA@^3.1.1

